      - heading "How it works" [level=2] [ref=e688]
      - paragraph [ref=e689]: Plugins declare what they need — notification, browser automation, scheduling — as abstract capabilities. Capability providers implement those contracts for specific environments. The dependency resolver detects your setup and picks the right providers automatically.
      - paragraph [ref=e690]: Data providers are secure vaults for personal information — payment cards, addresses, identity documents. Store sensitive data at install time, then use it in workflows without exposing raw values to conversation context. Built-in approval gates for high-sensitivity operations.
      - paragraph [ref=e691]: Frameworks are opinionated orchestration that composes capabilities into full workflows. Toolkits are pre-bundled sets of skills that work together — each skill is an individual tool, the toolkit packages them as a coordinated set. Apps do specific jobs. You install what you want — the system handles the wiring.
      - paragraph [ref=e692]: All open source, all free.
